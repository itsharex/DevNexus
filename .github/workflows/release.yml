name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows bundle
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS bundle
        run: npm run tauri build -- --bundles app,dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg  # 只上传 dmg，不上传 app
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libcurl4-openssl-dev \
            patchelf
      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux bundle
        run: npm run tauri build -- --bundles deb,appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-22.04
    needs: [build-windows, build-macos, build-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release  # 自动把所有 artifact 下载到这里

      - name: List downloaded release files
        run: find dist-release -maxdepth 5 -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DevNexus ${{ github.ref_name }}
          body_path: docs/releases/${{ github.ref_name }}.md  # 先注释掉，避免找不到文件
          files: |
            dist-release/release-windows/**/*.exe
            dist-release/release-macos/**/*.dmg
            dist-release/release-linux/**/*.deb
            dist-release/release-linux/**/*.AppImage
          fail_on_unmatched_files: true



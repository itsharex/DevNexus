name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows bundle
        run: npm run tauri build -- --bundles nsis

      - name: Package Windows portable build
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $portableDir = "portable/DevNexus_${version}_windows_portable"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null
          Copy-Item "src-tauri/target/release/devnexus.exe" "$portableDir/DevNexus.exe" -Force
          @"
          DevNexus $version Portable

          Run DevNexus.exe directly.

          LAN Chat notes:
          - Files are shared through the sender local LAN file service.
          - Images, audio, and videos auto-preview from the sender service.
          - Other files will ask for a save path before downloading.
          - Make sure the sender stays online while receivers preview or download files.
          "@ | Set-Content "$portableDir/README.txt" -Encoding UTF8
          Compress-Archive -Path "$portableDir/*" -DestinationPath "portable/DevNexus_${version}_windows_portable.zip" -Force

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            portable/*.zip
          if-no-files-found: error

  build-macos:
    name: build-macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS ${{ matrix.arch }} bundle
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles app,dmg

      - name: Collect macOS ${{ matrix.arch }} DMG
        run: |
          mkdir -p artifacts/macos-${{ matrix.arch }}
          for file in src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            base="$(basename "$file" .dmg)"
            cp "$file" "artifacts/macos-${{ matrix.arch }}/${base}_${{ matrix.arch }}.dmg"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-${{ matrix.arch }}
          path: artifacts/macos-${{ matrix.arch }}/*.dmg
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libcurl4-openssl-dev \
            patchelf
      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux bundle
        run: npm run tauri build -- --bundles deb,appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-22.04
    needs: [build-windows, build-macos, build-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-release  # 自动把所有 artifact 下载到这里

      - name: List downloaded release files
        run: find dist-release -maxdepth 5 -type f -print

      - name: Prepare GitHub Release body
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          repository = os.environ["REPOSITORY"]
          source = Path("docs/releases/cn") / f"{tag}.md"
          target = Path("dist-release/release-body.md")

          body = source.read_text(encoding="utf-8")
          relative_switch = f"[中文](./{tag}.md) | [English](../en/{tag}.md)"
          github_switch = (
              f"[中文](https://github.com/{repository}/blob/{tag}/docs/releases/cn/{tag}.md) | "
              f"[English](https://github.com/{repository}/blob/{tag}/docs/releases/en/{tag}.md)"
          )
          if relative_switch in body:
              body = body.replace(relative_switch, github_switch, 1)

          target.write_text(body, encoding="utf-8")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: DevNexus ${{ github.ref_name }}
          body_path: dist-release/release-body.md
          files: |
            dist-release/release-windows/**/*.exe
            dist-release/release-windows/**/*.zip
            dist-release/release-macos-*/*.dmg
            dist-release/release-linux/**/*.deb
            dist-release/release-linux/**/*.AppImage
          fail_on_unmatched_files: true

      - name: Trigger DevNexus_Doc website rebuild
        env:
          GH_TOKEN: ${{ secrets.DEVNEXUS_DOCS_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "DEVNEXUS_DOCS_TOKEN is not configured; skip DevNexus_Doc rebuild dispatch."
            exit 0
          fi
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/DumKing/DevNexus_Doc/dispatches \
            -f event_type=devnexus-release \
            -f client_payload[tag]="$RELEASE_TAG"

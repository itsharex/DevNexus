name: tag-verify

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-tag-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        run: |
          tag_commit="${{ github.sha }}"
          echo "Checking whether $tag_commit is reachable from origin/main..."

          git fetch origin main:refs/remotes/origin/main

          if git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Success: this release tag is based on main."
          else
            echo "::error::Release tags must point to commits reachable from main."
            exit 1
          fi

name: build-desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tauri-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows bundle
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  tauri-macos:
    name: tauri-macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-13
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS ${{ matrix.arch }} bundle
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles app,dmg

      - name: Collect macOS ${{ matrix.arch }} DMG
        run: |
          mkdir -p artifacts/macos-${{ matrix.arch }}
          for file in src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            base="$(basename "$file" .dmg)"
            cp "$file" "artifacts/macos-${{ matrix.arch }}/${base}_${{ matrix.arch }}.dmg"
          done

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-macOS-${{ matrix.arch }}-app
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg installer
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-macOS-${{ matrix.arch }}-dmg
          path: artifacts/macos-${{ matrix.arch }}/*.dmg
          if-no-files-found: error

  tauri-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libcurl4-openssl-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux bundle
        run: npm run tauri build -- --bundles deb,appimage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
